name: npm version check

on:
  schedule:
    # Run daily at 09:00 UTC (18:00 JST)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔍 Compare git tag vs npm version
        id: compare
        run: |
          GIT_VERSION=$(git tag --list 'v*' --sort=-version:refname | head -1 | sed 's/^v//')
          NPM_VERSION=$(npm view uloop-cli version 2>/dev/null || echo "not-found")

          echo "git_version=${GIT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "npm_version=${NPM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "📋 Git tag: v${GIT_VERSION}"
          echo "📋 npm: ${NPM_VERSION}"

          if [ "${GIT_VERSION}" = "${NPM_VERSION}" ]; then
            echo "✅ Versions match"
            echo "mismatch=false" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Version mismatch detected"
            echo "mismatch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔍 Check for existing issue
        if: steps.compare.outputs.mismatch == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=$(gh issue list --label "npm-publish-failed" --state open --json number --jq '.[0].number // empty')
          if [ -n "${ISSUE}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Open issue #${ISSUE} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🚨 Create issue
        if: steps.compare.outputs.mismatch == 'true' && steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_VERSION: ${{ steps.compare.outputs.git_version }}
          NPM_VERSION: ${{ steps.compare.outputs.npm_version }}
        run: |
          gh label create "npm-publish-failed" --color "d73a4a" --description "npm publish failed for a release" --force
          gh issue create \
            --title "npm publish failed: v${GIT_VERSION} not on npm" \
            --label "npm-publish-failed" \
            --body "## npm version mismatch detected

          | Source | Version |
          |--------|---------|
          | Git tag | v${GIT_VERSION} |
          | npm | ${NPM_VERSION} |

          ### How to fix

          Run the [manual-npm-publish](../actions/workflows/npm-publish.yml) workflow with ref \`v${GIT_VERSION}\`.

          This issue was created automatically by the [npm version check](../actions/workflows/npm-version-check.yml) workflow."
