name: publish-on-release

on:
  release:
    types: [published]

permissions:
  actions: write
  contents: read

jobs:
  dispatch-publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Dispatch native-cli-publish workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh workflow run native-cli-publish.yml \
            --ref main \
            -f ref="${RELEASE_TAG}" \
            -f dry-run=false \
            --repo "${GITHUB_REPOSITORY}"
