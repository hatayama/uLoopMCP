name: Build and Test Unity CLI Loop

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main, v3-beta]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache-dependency-path: Packages/src/GoCli~/go.sum

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check native Go CLI
        run: scripts/check-go-cli.sh

      - name: Build native Go CLI
        run: scripts/build-go-cli.sh

      - name: Verify checked-in native Go CLI binaries
        run: |
          git diff --exit-code -- \
            Packages/src/GoCli~/dist/darwin-arm64/uloop-core \
            Packages/src/GoCli~/dist/darwin-amd64/uloop-core \
            Packages/src/GoCli~/dist/windows-amd64/uloop-core.exe \
            Packages/src/GoCli~/dist/darwin-arm64/uloop-dispatcher \
            Packages/src/GoCli~/dist/darwin-amd64/uloop-dispatcher \
            Packages/src/GoCli~/dist/windows-amd64/uloop-dispatcher.exe

      - name: Package native Go CLI installers
        run: scripts/package-go-cli.sh

  test-unity-package:
    runs-on: ubuntu-latest
    needs: build-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Unity Package structure
        run: |
          echo "Validating Unity Package structure..."

          test -f "Packages/src/package.json" || exit 1
          test -d "Packages/src/Editor" || exit 1
          test -d "Packages/src/GoCli~" || exit 1
          test -f "Packages/src/GoCli~/dist/darwin-arm64/uloop-core" || exit 1
          test -f "Packages/src/GoCli~/dist/windows-amd64/uloop-core.exe" || exit 1

          echo "✅ Unity Package structure is valid"

      - name: Validate package.json
        working-directory: Packages/src
        run: |
          echo "Validating package.json syntax..."
          jq empty package.json
          echo "✅ package.json is valid"
