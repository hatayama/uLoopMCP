name: Build and Test Unity CLI Loop

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, v3-beta ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'Packages/src/Cli~/package-lock.json'

      - name: Install CLI dependencies
        working-directory: Packages/src/Cli~
        run: npm ci

      - name: Type check CLI
        working-directory: Packages/src/Cli~
        run: npx tsc --noEmit

      - name: Run knip on CLI
        working-directory: Packages/src/Cli~
        run: npx knip

      - name: Build CLI
        working-directory: Packages/src/Cli~
        run: npm run build

  test-unity-package:
    runs-on: ubuntu-latest
    needs: build-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Unity Package structure
        run: |
          echo "Validating Unity Package structure..."

          test -f "Packages/src/package.json" || exit 1
          test -d "Packages/src/Editor" || exit 1
          test -d "Packages/src/Cli~" || exit 1

          echo "✅ Unity Package structure is valid"

      - name: Validate package.json
        working-directory: Packages/src
        run: |
          echo "Validating package.json syntax..."
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          echo "✅ package.json is valid"
